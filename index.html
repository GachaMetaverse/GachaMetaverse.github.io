<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8% Scans</title>
<meta name="description" content="8% Scans — scanlation releases, read online.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="config.js"></script>
<script src="content.js"></script>

<style>
:root{
  --bg:#0a0b0f; --surface:#12141a; --surface2:#1a1d26; --line:#262b38;
  --text:#e9eaf0; --muted:#8b91a3; --dim:#585e6e;
  --amber:#ffb454; --amber-soft:rgba(255,180,84,.14);
  --green:#45d483; --green-soft:rgba(69,212,131,.14);
  --red:#ff5d5d;
  --disp:"Unbounded",sans-serif;
  --body:"Instrument Sans",system-ui,sans-serif;
  --mono:"IBM Plex Mono",ui-monospace,monospace;
  --rad:12px; --maxw:1180px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scrollbar-color:var(--line) transparent}
body{background:var(--bg); color:var(--text); font:400 15px/1.6 var(--body); min-height:100vh}
a{color:inherit; text-decoration:none}
img{display:block}
button{font-family:var(--body)}
::selection{background:var(--amber-soft)}
:focus-visible{outline:2px solid var(--amber); outline-offset:2px; border-radius:4px}
@media (prefers-reduced-motion:reduce){ *,*::before,*::after{animation:none!important; transition:none!important} }

/* ---------------- nav ---------------- */
nav{
  position:sticky; top:0; z-index:50; background:rgba(10,11,15,.85);
  backdrop-filter:blur(10px); border-bottom:1px solid var(--line);
}
.nav-in{max-width:var(--maxw); margin:0 auto; padding:10px 20px; display:flex; align-items:center; gap:16px}
.logo{display:flex; align-items:center; gap:10px; font:700 15px var(--disp); letter-spacing:.02em; white-space:nowrap}
.logo svg{flex:none}
.logo .pct{color:var(--amber)}
.nav-links{display:flex; gap:4px; margin-left:auto; align-items:center}
.icon-link{
  display:flex; align-items:center; justify-content:center; width:36px; height:36px;
  border-radius:9px; color:var(--muted); border:1px solid transparent;
}
.icon-link:hover{color:var(--text); background:var(--surface2); border-color:var(--line)}
.btn{
  display:inline-flex; align-items:center; gap:8px; cursor:pointer;
  background:var(--surface2); color:var(--text); border:1px solid var(--line);
  font:500 13px var(--body); padding:8px 16px; border-radius:9px;
}
.btn:hover{border-color:var(--dim)}
.btn.primary{background:var(--amber); border-color:var(--amber); color:#14100a; font-weight:600}
.btn.primary:hover{filter:brightness(1.07)}
.btn.ghost{background:transparent}
.btn:disabled{opacity:.45; cursor:default}
.btn.small{padding:5px 11px; font-size:12px; border-radius:7px}

/* ---------------- layout ---------------- */
main{max-width:var(--maxw); margin:0 auto; padding:26px 20px 70px}
.eyebrow{
  font:700 11px var(--disp); letter-spacing:.14em; text-transform:uppercase;
  color:var(--amber); display:flex; align-items:center; gap:10px; margin:38px 0 16px;
}
.eyebrow::after{content:""; height:1px; flex:1; background:var(--line)}
.eyebrow .sub{font:500 11px var(--mono); color:var(--dim); letter-spacing:0; text-transform:none}

/* ---------------- hero ---------------- */
.hero{
  position:relative; border:1px solid var(--line); border-radius:16px; overflow:hidden;
  background:var(--surface); margin-top:6px;
}
.hero-bg{position:absolute; inset:0; background-size:cover; background-position:center 25%;
  filter:blur(28px) saturate(1.1) brightness(.42); transform:scale(1.2)}
.hero-in{position:relative; display:flex; gap:26px; padding:28px; align-items:flex-end}
.hero-cover{width:170px; flex:none; aspect-ratio:2/3; border-radius:10px; overflow:hidden;
  border:1px solid rgba(255,255,255,.14); box-shadow:0 18px 40px rgba(0,0,0,.5); background:var(--surface2)}
.hero-cover img{width:100%; height:100%; object-fit:cover}
.hero-meta{min-width:0; padding-bottom:2px}
.hero-meta .kicker{font:600 11px var(--mono); color:var(--amber); letter-spacing:.1em; text-transform:uppercase}
.hero-meta h1{font:600 clamp(22px,4vw,34px)/1.15 var(--body); letter-spacing:-.01em; margin:8px 0 10px}
.hero-meta p{color:var(--muted); max-width:640px; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden}
.hero-actions{display:flex; gap:10px; margin-top:18px; flex-wrap:wrap}
@media (max-width:640px){ .hero-in{flex-direction:column; align-items:flex-start} .hero-cover{width:130px} }

/* ---------------- cards / grids ---------------- */
.grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:18px}
.card{position:relative; border-radius:var(--rad); overflow:hidden; background:var(--surface);
  border:1px solid var(--line); transition:transform .18s ease, border-color .18s ease}
.card:hover{transform:translateY(-3px); border-color:var(--dim)}
.card .cov{aspect-ratio:2/3; background:var(--surface2); position:relative}
.card .cov img{width:100%; height:100%; object-fit:cover}
.card .cinfo{padding:10px 12px 12px}
.card .ct{font:600 13px/1.35 var(--body); display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden}
.card .cs{font:500 11px var(--mono); color:var(--muted); margin-top:4px; display:flex; gap:8px; align-items:center}
.badge{position:absolute; top:8px; left:8px; background:rgba(10,11,15,.82); border:1px solid var(--line);
  color:var(--amber); font:600 10px var(--mono); padding:3px 7px; border-radius:6px; letter-spacing:.04em}
.rail{display:grid; grid-auto-flow:column; grid-auto-columns:150px; gap:16px; overflow-x:auto;
  padding-bottom:8px; scrollbar-width:thin}
.up-card{display:flex; gap:12px; background:var(--surface); border:1px solid var(--line);
  border-radius:var(--rad); padding:10px; align-items:center; transition:border-color .15s}
.up-card:hover{border-color:var(--dim)}
.up-card .cov{width:46px; height:64px; border-radius:7px; overflow:hidden; flex:none; background:var(--surface2)}
.up-card .cov img{width:100%; height:100%; object-fit:cover}
.up-card .t{font:600 13px/1.3 var(--body); display:-webkit-box; -webkit-line-clamp:1; -webkit-box-orient:vertical; overflow:hidden}
.up-card .c{font:500 12px var(--mono); color:var(--amber); margin-top:3px}
.up-card .d{font:400 11px var(--mono); color:var(--dim); margin-top:2px}
.updates{display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:12px}
.searchbar{display:flex; gap:10px; margin:0 0 18px}
.searchbar input{
  flex:1; background:var(--surface); border:1px solid var(--line); border-radius:10px;
  color:var(--text); font:400 14px var(--body); padding:10px 14px;
}
.searchbar input::placeholder{color:var(--dim)}
.empty{color:var(--dim); font:400 13px var(--mono); padding:26px; text-align:center;
  border:1px dashed var(--line); border-radius:var(--rad)}

/* ---------------- series page ---------------- */
.series{display:grid; grid-template-columns:230px 1fr; gap:30px; margin-top:8px}
@media (max-width:720px){ .series{grid-template-columns:1fr} .s-side{display:flex; gap:18px; align-items:flex-start} }
.s-cover{aspect-ratio:2/3; border-radius:12px; overflow:hidden; border:1px solid var(--line); background:var(--surface2)}
.s-cover img{width:100%; height:100%; object-fit:cover}
.s-side .btn{width:100%; justify-content:center; margin-top:10px}
@media (max-width:720px){ .s-side .s-cover{width:150px; flex:none} .s-side .side-actions{flex:1} .s-side .btn{margin-top:0; margin-bottom:10px} }
.s-title{font:600 clamp(22px,3.4vw,30px)/1.15 var(--body); letter-spacing:-.01em}
.s-sub{color:var(--muted); font:400 13px var(--mono); margin-top:6px}
.tags{display:flex; gap:7px; flex-wrap:wrap; margin:14px 0}
.tag{font:500 11px var(--mono); color:var(--muted); border:1px solid var(--line);
  padding:3px 9px; border-radius:999px; background:var(--surface)}
.s-desc{color:var(--muted); max-width:720px}
.status-dot{display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--green); margin-right:6px}
.status-dot.done{background:var(--amber)} .status-dot.hiatus{background:var(--dim)}

.rate-box{display:flex; align-items:center; gap:16px; flex-wrap:wrap; margin:18px 0 6px;
  background:var(--surface); border:1px solid var(--line); border-radius:var(--rad); padding:13px 16px}
.stars{display:flex; gap:3px}
.stars button{background:none; border:0; cursor:pointer; font-size:21px; line-height:1;
  color:var(--dim); padding:2px; transition:transform .1s}
.stars button:hover{transform:scale(1.15)}
.stars button.lit{color:var(--amber)}
.rate-num{font:600 16px var(--mono)}
.rate-num small{font-size:11px; color:var(--muted); font-weight:400}
.rate-note{font:400 11px var(--mono); color:var(--dim)}

.src-row{display:flex; gap:8px; flex-wrap:wrap; margin:14px 0 4px}
.src-chip{font:500 11px var(--mono); border:1px solid var(--line); border-radius:8px;
  padding:4px 10px; color:var(--muted); display:flex; gap:7px; align-items:center}
.src-chip .ok{color:var(--green)} .src-chip .bad{color:var(--red)}

.ch-table{margin-top:16px; border:1px solid var(--line); border-radius:var(--rad); overflow:hidden}
.ch-row{display:flex; align-items:center; gap:14px; padding:11px 16px; background:var(--surface);
  border-bottom:1px solid var(--line); transition:background .12s}
.ch-row:last-child{border-bottom:0}
.ch-row:hover{background:var(--surface2)}
.ch-num{font:600 13px var(--mono); color:var(--amber); width:64px; flex:none}
.ch-title{flex:1; min-width:0; font:500 14px var(--body); overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
.ch-date{font:400 11px var(--mono); color:var(--dim); flex:none}
.thumb-btn{display:inline-flex; align-items:center; gap:6px; background:none; cursor:pointer;
  border:1px solid var(--line); border-radius:8px; color:var(--muted);
  font:500 12px var(--mono); padding:4px 10px; flex:none}
.thumb-btn:hover{border-color:var(--dim); color:var(--text)}
.thumb-btn.on{color:var(--green); border-color:var(--green); background:var(--green-soft)}
@media (max-width:560px){ .ch-date{display:none} }

/* ---------------- reader ---------------- */
body.reading main{max-width:none; padding:0 0 86px}
.r-top{position:sticky; top:0; z-index:40; background:rgba(10,11,15,.9); backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line); display:flex; align-items:center; gap:10px;
  padding:8px 14px; flex-wrap:wrap}
.r-top .title{font:600 13px var(--body); min-width:0; overflow:hidden; text-overflow:ellipsis;
  white-space:nowrap; max-width:26vw}
select{background:var(--surface2); color:var(--text); border:1px solid var(--line);
  border-radius:8px; font:500 12px var(--mono); padding:6px 8px; max-width:180px}
.seg{display:flex; border:1px solid var(--line); border-radius:8px; overflow:hidden; flex:none}
.seg button{background:transparent; color:var(--muted); border:0; font:500 12px var(--body);
  padding:6px 11px; cursor:pointer; white-space:nowrap}
.seg button + button{border-left:1px solid var(--line)}
.seg button.on{background:var(--surface2); color:var(--text)}
.seg button.src-ok::before{content:""; display:inline-block; width:6px; height:6px; border-radius:50%;
  background:var(--green); margin-right:6px; vertical-align:1px}
.seg button.src-bad{color:var(--dim); text-decoration:line-through}
.r-spacer{flex:1}

.strip{display:flex; flex-direction:column; align-items:center; gap:0}
.strip img{width:100%; max-width:900px; height:auto; background:var(--surface)}
body.fit-wide .strip img{max-width:100%}
body.fit-orig .strip img{width:auto; max-width:none}

.paged-stage{display:flex; overflow:auto; justify-content:safe center;
  height:calc(100vh - 150px); position:relative}
.paged-stage img{margin:auto; background:var(--surface)}
body.fit-screen .paged-stage img{max-width:100%; max-height:100%; width:auto; height:auto}
body.fit-wide .paged-stage img{width:100%; height:auto}
.pg-zone{position:absolute; top:0; bottom:0; width:32%; cursor:pointer; z-index:5}
.pg-zone.left{left:0} .pg-zone.right{right:0}

.r-bottom{position:fixed; left:0; right:0; bottom:0; z-index:40;
  background:rgba(10,11,15,.92); backdrop-filter:blur(10px); border-top:1px solid var(--line);
  display:flex; align-items:center; gap:12px; padding:9px 16px}
.battery{display:flex; align-items:center; gap:9px; flex:1; min-width:0}
.batt-shell{flex:1; max-width:420px; height:14px; border:1.5px solid var(--muted); border-radius:5px;
  position:relative; padding:2px}
.batt-shell::after{content:""; position:absolute; right:-5px; top:3.5px; width:3px; height:5px;
  background:var(--muted); border-radius:0 2px 2px 0}
.batt-fill{height:100%; width:8%; background:var(--amber); border-radius:2px; transition:width .2s}
.batt-fill.full{background:var(--green)}
.batt-label{font:600 11px var(--mono); color:var(--muted); white-space:nowrap}
.r-loading{padding:70px 20px; text-align:center; color:var(--dim); font:400 13px var(--mono)}
.r-error{margin:40px auto; max-width:560px; text-align:center; padding:30px; border:1px solid var(--line);
  border-radius:var(--rad); color:var(--muted); font:400 13px/1.8 var(--mono)}
.r-end{max-width:900px; margin:34px auto 8px; padding:0 16px; display:flex; gap:10px; justify-content:center; flex-wrap:wrap}

/* ---------------- disqus ---------------- */
.comments{margin-top:40px; border-top:1px solid var(--line); padding-top:24px}
.comments.hidden{display:none}
#disqus_thread{min-height:80px}
.comments .note{color:var(--dim); font:400 12px var(--mono); padding:14px 0}

/* ---------------- modal / toast ---------------- */
.modal-back{position:fixed; inset:0; z-index:90; background:rgba(5,6,9,.7); backdrop-filter:blur(4px);
  display:flex; align-items:center; justify-content:center; padding:20px}
.modal{background:var(--surface); border:1px solid var(--line); border-radius:16px;
  width:100%; max-width:380px; padding:26px}
.modal h2{font:700 14px var(--disp); letter-spacing:.02em; margin-bottom:4px}
.modal .mt{color:var(--dim); font:400 12px var(--mono); margin-bottom:18px}
.modal label{display:block; font:500 12px var(--body); color:var(--muted); margin:12px 0 5px}
.modal input{width:100%; background:var(--bg); border:1px solid var(--line); border-radius:9px;
  color:var(--text); font:400 14px var(--body); padding:9px 12px}
.modal .err{color:var(--red); font:400 12px var(--mono); margin-top:12px; min-height:16px}
.modal .row{display:flex; gap:10px; margin-top:18px}
.modal .row .btn{flex:1; justify-content:center}
.modal .switch{margin-top:14px; text-align:center; font:400 12px var(--body); color:var(--muted)}
.modal .switch a{color:var(--amber); cursor:pointer}
#toast{position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(8px); z-index:99;
  background:var(--surface2); border:1px solid var(--line); color:var(--text);
  font:500 13px var(--body); padding:10px 18px; border-radius:10px; opacity:0;
  transition:opacity .2s, transform .2s; pointer-events:none; max-width:90vw}
#toast.show{opacity:1; transform:translateX(-50%) translateY(0)}

/* ---------------- footer ---------------- */
footer{border-top:1px solid var(--line); margin-top:30px}
.foot-in{max-width:var(--maxw); margin:0 auto; padding:26px 20px; display:flex; gap:18px;
  align-items:center; flex-wrap:wrap; color:var(--dim); font:400 12px var(--mono)}
.foot-in a{color:var(--muted)} .foot-in a:hover{color:var(--text)}
.foot-links{display:flex; gap:14px; margin-left:auto}
</style>
</head>
<body>

<nav>
  <div class="nav-in">
    <a class="logo" href="#/" aria-label="8% Scans home">
      <svg width="30" height="16" viewBox="0 0 30 16" aria-hidden="true">
        <rect x="1" y="1" width="25" height="14" rx="3.5" fill="none" stroke="#8b91a3" stroke-width="1.6"/>

      </a>

<main id="app"></main>

<footer>
  <div class="foot-in">
    <span>© <span id="yr"></span> 8% Scans · all chapters are loaded from external hosts — nothing is stored on this site.</span>
    <div class="foot-links">
      <a id="fKofi" target="_blank" rel="noopener">Ko-fi</a>
      <a id="fMd" target="_blank" rel="noopener">MangaDex</a>
      <a id="fReddit" target="_blank" rel="noopener">Reddit</a>

<script>
"use strict";
/* =============== tiny helpers =============== */
const $  = s => document.querySelector(s);
const app = $("#app");
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
let toastT;
function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"), 2600); }
function timeAgo(d){
  if(!d) return ""; const s=(Date.now()-d.getTime())/1000;
  if(s<90) return "just now";
  const u=[[60,"m"],[60,"h"],[24,"d"],[7,"w"],[4.35,"mo"],[12,"y"]];
  let v=s/60, i=0;
  while(i<u.length-1 && v>=u[i+1][0]){ v/=u[i+1][0]; i++; }
  return Math.floor(v)+u[i][1]+" ago";
}
const byNum = (a,b)=>{ const x=parseFloat(a), y=parseFloat(b);
  return (isNaN(x)||isNaN(y)) ? String(a).localeCompare(String(b)) : x-y; };

/* =============== external links =============== */
for(const [id,url] of [["#lnkKofi",SITE.kofi],["#lnkMd",SITE.mangadex],["#lnkReddit",SITE.reddit],
                       ["#fKofi",SITE.kofi],["#fMd",SITE.mangadex],["#fReddit",SITE.reddit]])
  $(id).href = url;
$("#yr").textContent = new Date().getFullYear();

/* =============== cubari loading =============== */
function parseCubari(url){
  const m = String(url||"").match(/cubari\.moe\/read\/([a-z0-9_-]+)\/([^\/\s?#]+)/i);
  return m ? {src:m[1].toLowerCase(), slug:m[2]} : null;
}
async function fetchJSON(url){
  const routes = [
    u=>u,
    u=>"https://api.allorigins.win/raw?url="+encodeURIComponent(u),
    u=>"https://corsproxy.io/?url="+encodeURIComponent(u),
    u=>"https://api.codetabs.com/v1/proxy?quest="+encodeURIComponent(u),
  ];
  let last;
  for(const r of routes){
    try{
      const res = await fetch(r(url));
      if(!res.ok) throw new Error("HTTP "+res.status);
      return await res.json();
    }catch(e){ last = e; }
  }
  throw last || new Error("fetch failed");
}
function lsGet(k){
  try{ const raw=localStorage.getItem(k); if(!raw) return null;
    const {t,v}=JSON.parse(raw);
    if(Date.now()-t > (SITE.cacheMinutes||30)*60000) return null;
    return v;
  }catch(e){ return null; }
}
function lsPut(k,v){ try{ localStorage.setItem(k, JSON.stringify({t:Date.now(), v})); }catch(e){} }

const srcMem = new Map();     // sourceUrl -> normalized series data (this session)
async function loadSource(url){
  if(srcMem.has(url)) return srcMem.get(url);
  const p = parseCubari(url);
  if(!p) throw new Error("not a cubari link");
  const key = "cub:"+p.src+":"+p.slug;
  let raw = lsGet(key);
  if(!raw){
    raw = await fetchJSON(`https://cubari.moe/read/api/${p.src}/series/${p.slug}/`);
    lsPut(key, raw);
  }
  const chapters = Object.entries(raw.chapters||{}).map(([num,c])=>{
    let date = null;
    const lu = c.last_updated || (c.release_date && Object.values(c.release_date)[0]);
    if(lu){ const n = parseInt(lu,10); if(!isNaN(n)) date = new Date(n*1000); }
    return {num, title:c.title||"", groups:c.groups||{}, date};
  }).sort((a,b)=>byNum(a.num,b.num));
  const data = {
    title: raw.title||"", description: raw.description||"",
    cover: raw.cover||"", author: raw.author||"", artist: raw.artist||"",
    chapters, chMap: Object.fromEntries(chapters.map(c=>[c.num,c])),
  };
  srcMem.set(url, data);
  return data;
}
/* Try a manga's sources in order; resolve first that loads. */
const mangaMem = new Map();   // slug -> {data, srcIdx, status[]}
async function loadManga(entry, forceIdx=null){
  const ck = entry.slug + ":" + (forceIdx ?? "auto");
  if(mangaMem.has(ck)) return mangaMem.get(ck);
  const status = entry.sources.map(()=> "pending");
  const order = forceIdx!=null ? [forceIdx] : entry.sources.map((_,i)=>i);
  let out = null, lastErr = null;
  for(const i of order){
    try{
      const data = await loadSource(entry.sources[i].url);
      status[i] = "ok";
      out = {data, srcIdx:i, status};
      break;
    }catch(e){ status[i]="bad"; lastErr = e; }
  }
  if(!out) throw lastErr || new Error("no source loaded");
  mangaMem.set(ck, out);
  return out;
}
async function getPages(data, num){
  const ch = data.chMap[num];
  if(!ch) throw new Error("chapter not found");
  const g = Object.values(ch.groups)[0];
  let arr = g;
  if(typeof g === "string"){
    const u = g.startsWith("http") ? g : "https://cubari.moe"+g;
    arr = await fetchJSON(u);
    if(arr && !Array.isArray(arr)) arr = arr.pages || arr.images || [];
  }
  if(!Array.isArray(arr)) throw new Error("unsupported chapter format");
  return arr.map(x => typeof x==="string" ? x : (x.src || x.url || x.link)).filter(Boolean);
}

/* ---- ratings ---- */
async function ratingSummary(slug){
  if(!fb) return null;
  const {collection, query, where, getAggregateFromServer, count, average} = fb.F;
  try{
    const q = query(collection(fb.db,"ratings"), where("slug","==",slug));
    const s = await getAggregateFromServer(q, {n:count(), avg:average("stars")});
    return {n:s.data().n, avg:s.data().avg};
  }catch(e){ console.warn(e); return null; }
}
async function myRating(slug){
  if(!fb || !user) return 0;
  try{
    const d = await fb.F.getDoc(fb.F.doc(fb.db,"ratings", slug+"__"+user.uid));
    return d.exists() ? d.data().stars : 0;
  }catch(e){ return 0; }
}
async function setRating(slug, stars){
  const {doc, setDoc, serverTimestamp} = fb.F;
  await setDoc(doc(fb.db,"ratings", slug+"__"+user.uid),
    {slug, uid:user.uid, stars, ts:serverTimestamp()});
}
/* ---- thumbs ---- */
async function thumbsFor(slug){
  if(!fb) return {counts:{}, mine:new Set()};
  try{
    const {collection, query, where, getDocs} = fb.F;
    const snap = await getDocs(query(collection(fb.db,"thumbs"), where("slug","==",slug)));
    const counts={}, mine=new Set();
    snap.forEach(d=>{ const v=d.data();
      counts[v.ch]=(counts[v.ch]||0)+1;
      if(user && v.uid===user.uid) mine.add(v.ch);
    });
    return {counts, mine};
  }catch(e){ console.warn(e); return {counts:{}, mine:new Set()}; }
}
async function toggleThumb(slug, ch){
  const {doc, getDoc, setDoc, deleteDoc, serverTimestamp} = fb.F;
  const ref = doc(fb.db,"thumbs", slug+"__"+ch+"__"+user.uid);
  const cur = await getDoc(ref);
  if(cur.exists()){ await deleteDoc(ref); return false; }
  await setDoc(ref, {slug, ch:String(ch), uid:user.uid, ts:serverTimestamp()});
  return true;
}

function mountDisqus(container, identifier){

  };
  if(window.DISQUS){

    s.src = "https://"+SITE.disqusShortname+".disqus.com/embed.js";

window.addEventListener("hashchange", route);
function nav(h){ location.hash = h; }
function route(){
  document.body.classList.remove("reading","fit-wide","fit-orig","fit-screen");
  window.scrollTo(0,0);
  const [path, q] = (location.hash.slice(1)||"/").split("?");
  const parts = path.split("/").filter(Boolean);
  const qs = new URLSearchParams(q||"");
  if(parts[0]==="series" && bySlug[parts[1]]){
    document.title = bySlug[parts[1]].title + " · " + SITE.name;
    renderSeries(bySlug[parts[1]]);
  }
  else if(parts[0]==="read" && bySlug[parts[1]] && parts[2]!=null){
    document.title = bySlug[parts[1]].title + " ch. " + decodeURIComponent(parts[2]) + " · " + SITE.name;
    renderReader(bySlug[parts[1]], decodeURIComponent(parts[2]), qs);
  }
  else { document.title = SITE.name; renderHome(); }
}

    }).join("");

  const settled = await Promise.allSettled(CATALOG.map(e=>loadManga(e)));
  if(location.hash && !location.hash.startsWith("#/") && location.hash!=="") {} // no-op

    if(s.status!=="fulfilled") return;
    const entry = CATALOG[i], data = s.value.data;
    for(const ch of data.chapters) updates.push({entry, ch, cov:coverOf(entry,data)});
  });
  updates.sort((a,b)=>(b.ch.date?.getTime()||0)-(a.ch.date?.getTime()||0));
  $("#updates").innerHTML = updates.slice(0,12).map(u=>`
    <a class="up-card" href="#/read/${esc(u.entry.slug)}/${encodeURIComponent(u.ch.num)}">

        <div class="d">${u.ch.date?esc(timeAgo(u.ch.date)):""}</div>
      </div></a>`).join("") || `<div class="empty">no chapters loaded — check your cubari links in content.js</div>`;
  $("#updNote").textContent = updates.length ? updates.length+" chapters tracked" : "offline";

  // hero cover/backdrop now that data may exist
  const fEntry = featured && mangaMem.get(featured.slug+":auto");
  if(featured){

      .sort((a,b)=> b.s.n-a.s.n || b.s.avg-a.s.avg).slice(0,6);

    sums.forEach(({e,s})=>{ if(!s||!s.n) return;
      document.querySelectorAll(`[data-rate="${CSS.escape(e.slug)}"]`)
        .forEach(el=> el.textContent = "★ "+(s.avg*2).toFixed(1)+"/10 · "+s.n);
    });
  }
}

      </div>
      <button class="thumb-btn" id="rThumb">▲ <span>0</span></button>
      <button class="btn small" id="nextCh">Next ▸</button>
    </div>`;

  const S = {mode, fit, dir, pages:[], page:0, chapters:[], data:null};

  /* --- load the requested source (with fallback) --- */
  async function loadFor(idx){
    $("#rBody").innerHTML = `<div class="r-loading">// fetching pages…</div>`;
    let loaded;
    try{ loaded = await loadManga(entry, idx); }
    catch(e){
      try{ loaded = await loadManga(entry); srcIdx = loaded.srcIdx;
        toast("Source "+(idx+1)+" is down — switched to "+(entry.sources[srcIdx].label||"source "+(srcIdx+1))); }
      catch(e2){
        $("#rBody").innerHTML = `<div class="r-error">every source for this series failed to load.<br>the hosts may be down — try again later.</div>`;
        return false;
      }
    }
    S.data = loaded.data; S.chapters = loaded.data.chapters;
    if(!S.data.chMap[chNum]) chNum = S.chapters[0]?.num;
    try{ S.pages = await getPages(S.data, chNum); }
    catch(e){
      $("#rBody").innerHTML = `<div class="r-error">chapter ${esc(chNum)} couldn't be loaded from this source.<br>try another source button above.</div>`;
      return false;
    }
    return true;
  }

  /* --- chrome --- */
  function paintChrome(){
    const sel = $("#chSel");
    sel.innerHTML = S.chapters.map(c=>`<option value="${esc(c.num)}" ${c.num===chNum?"selected":""}>Ch. ${esc(c.num)}${c.title?" — "+esc(c.title):""}</option>`).join("");
    sel.onchange = ()=>nav(`/read/${entry.slug}/${encodeURIComponent(sel.value)}?src=${srcIdx}`);

    $("#srcSeg").innerHTML = entry.sources.map((s,i)=>
      `<button data-i="${i}" class="${i===srcIdx?"on ":""}${mangaMem.has(entry.slug+":"+i)?"src-ok":""}">${esc(s.label||("Source "+(i+1)))}</button>`).join("");
    document.querySelectorAll("#srcSeg button").forEach(b=>{
      b.onclick = ()=>nav(`/read/${entry.slug}/${encodeURIComponent(chNum)}?src=${b.dataset.i}`);
    });

    $("#mStrip").classList.toggle("on", S.mode==="strip");
    $("#mPaged").classList.toggle("on", S.mode==="paged");
    $("#mStrip").onclick = ()=>{ prefs.mode=S.mode="strip"; savePrefs(); paintChrome(); paintPages(); };
    $("#mPaged").onclick = ()=>{ prefs.mode=S.mode="paged"; savePrefs(); paintChrome(); paintPages(); };

    const fits = S.mode==="strip" ? [["normal","Normal"],["wide","Wide"],["orig","1:1"]]
                                  : [["screen","Fit screen"],["wide","Fit width"],["orig","1:1"]];
    if(!fits.some(f=>f[0]===S.fit)) S.fit = fits[0][0];
    $("#fitSeg").innerHTML = fits.map(([v,l])=>`<button data-f="${v}" class="${S.fit===v?"on":""}">${l}</button>`).join("");
    document.querySelectorAll("#fitSeg button").forEach(b=>{
      b.onclick = ()=>{ prefs.fit=S.fit=b.dataset.f; savePrefs(); paintChrome(); paintPages(); };
    });

    $("#dirSeg").style.display = S.mode==="paged" ? "" : "none";
    $("#dLtr").classList.toggle("on", S.dir==="ltr");
    $("#dRtl").classList.toggle("on", S.dir==="rtl");
    $("#dLtr").onclick = ()=>{ prefs.dir=S.dir="ltr"; savePrefs(); paintChrome(); };
    $("#dRtl").onclick = ()=>{ prefs.dir=S.dir="rtl"; savePrefs(); paintChrome(); };

    const i = S.chapters.findIndex(c=>c.num===chNum);
    $("#prevCh").disabled = i<=0;
    $("#nextCh").disabled = i<0 || i>=S.chapters.length-1;
    $("#prevCh").onclick = ()=> i>0 && nav(`/read/${entry.slug}/${encodeURIComponent(S.chapters[i-1].num)}?src=${srcIdx}`);
    $("#nextCh").onclick = ()=> i<S.chapters.length-1 && nav(`/read/${entry.slug}/${encodeURIComponent(S.chapters[i+1].num)}?src=${srcIdx}`);

    const end = $("#rEnd");
    end.innerHTML = `
      ${i>0?`<a class="btn" href="#/read/${esc(entry.slug)}/${encodeURIComponent(S.chapters[i-1].num)}?src=${srcIdx}">◂ Ch. ${esc(S.chapters[i-1].num)}</a>`:""}
      <a class="btn" href="#/series/${esc(entry.slug)}">All chapters</a>
      ${i<S.chapters.length-1?`<a class="btn primary" href="#/read/${esc(entry.slug)}/${encodeURIComponent(S.chapters[i+1].num)}?src=${srcIdx}">Ch. ${esc(S.chapters[i+1].num)} ▸</a>`:""}`;
  }

  /* --- pages --- */
  function battery(pct, label){
    const f = $("#battFill"); if(!f) return;
    f.style.width = Math.max(8, Math.min(100, pct))+"%";
    f.classList.toggle("full", pct>=100);
    $("#battLbl").textContent = label;
  }
  function fitClass(){
    document.body.classList.remove("fit-wide","fit-orig","fit-screen");
    if(S.fit==="wide") document.body.classList.add("fit-wide");
    if(S.fit==="orig") document.body.classList.add("fit-orig");
    if(S.fit==="screen") document.body.classList.add("fit-screen");
  }
  function paintPages(){
    fitClass();
    const body = $("#rBody");
    if(S.mode==="strip"){
      body.innerHTML = `<div class="strip">${S.pages.map((p,i)=>`<img loading="lazy" src="${esc(p)}" alt="page ${i+1}">`).join("")}</div>`;
      onScroll();
    }else{
      S.page = Math.min(S.page, S.pages.length-1);
      body.innerHTML = `
        <div class="paged-stage" id="pStage">
          <img src="${esc(S.pages[S.page])}" alt="page ${S.page+1}">
          <div class="pg-zone left" aria-label="previous"></div>
          <div class="pg-zone right" aria-label="next"></div>
        </div>`;
      const step = d => { const nd = S.dir==="rtl" ? -d : d;
        const np = S.page+nd;
        if(np<0 || np>=S.pages.length) return;
        S.page = np; paintPages();
      };
      body.querySelector(".pg-zone.left").onclick  = ()=>step(-1);
      body.querySelector(".pg-zone.right").onclick = ()=>step(1);
      // preload neighbours
      [S.page+1,S.page+2,S.page-1].forEach(n=>{ if(S.pages[n]) (new Image()).src=S.pages[n]; });
      battery(((S.page+1)/S.pages.length)*100, (S.page+1)+" / "+S.pages.length);
    }
  }
  function onScroll(){
    if(S.mode!=="strip") return;
    const max = document.documentElement.scrollHeight - innerHeight;
    const pct = max>0 ? (scrollY/max)*100 : 100;
    battery(pct, Math.round(pct)+"%");
  }
  window.addEventListener("scroll", onScroll, {passive:true});

  const keyHandler = e=>{
    if(e.target.tagName==="INPUT"||e.target.tagName==="SELECT") return;
    if(S.mode==="paged"){
      if(e.key==="ArrowRight") (S.dir==="rtl"? S.page>0 && S.page-- : S.page<S.pages.length-1 && S.page++), paintPages();
      else if(e.key==="ArrowLeft") (S.dir==="rtl"? S.page<S.pages.length-1 && S.page++ : S.page>0 && S.page--), paintPages();
    }
  };
  document.addEventListener("keydown", keyHandler);
  window.addEventListener("hashchange", ()=>{
    document.removeEventListener("keydown", keyHandler);
    window.removeEventListener("scroll", onScroll);
  }, {once:true});

  /* --- go --- */
  if(!(await loadFor(srcIdx))) return;
  paintChrome();
  paintPages();
  recAdd(entry.slug, chNum);
  mountDisqus($("#rComments #cbox"), "chapter-"+entry.slug+"-"+chNum);

  /* chapter thumb button */
  async function refreshRThumb(){
    const {counts, mine} = await thumbsFor(entry.slug);
    const b = $("#rThumb"); if(!b) return;
    b.querySelector("span").textContent = counts[chNum]||0;
    b.classList.toggle("on", mine.has(String(chNum)));
  }
  refreshRThumb();
  $("#rThumb").onclick = async ()=>{
    if(!requireUser()) return;
    try{ const on = await toggleThumb(entry.slug, chNum);
      toast(on?"Thanks for the thumbs up!":"Thumbs up removed"); refreshRThumb(); }
    catch(e){ toast("Couldn't save"); console.warn(e); }
  };
}

/* =============== boot =============== */
initFirebase();
route();
</script>
</body>
</html>
