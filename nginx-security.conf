# Nginx config for self-hosting on a VPS (advanced option).
# Include this inside your server { } block:
#   include /etc/nginx/snippets/nginx-security.conf;
#
# Assumes HTTPS is already set up with certbot (see SETUP-GUIDE.md
# section 5, option C). Only use this route if you're comfortable
# maintaining a server — Netlify/Cloudflare Pages are safer for
# beginners because the platform patches itself.

# --- Security headers ---
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests" always;
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-origin" always;

# --- Hide server version ---
server_tokens off;

# --- Never serve dotfiles, docs, or config files ---
location ~ /\. { deny all; }
location ~* \.(md|log|bak|conf)$ { deny all; }

# --- Disable directory listing ---
autoindex off;

# --- Caching ---
location ~* \.(css|png|jpe?g|webp|svg|woff2?)$ { expires 7d; }
location ~* \.js$ { expires 1d; }
location ~* \.html$ { expires 10m; }
